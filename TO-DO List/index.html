<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TO-DO LIST</title>

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS FILE -->
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!-- THEME TOGGLE BUTTON -->
    <button id="modeToggle"><i class="fas fa-moon"></i></button>

    <!-- MAIN CONTAINER -->
    <div class="container">

        <h1>SUNSHINE'S TO-DO LIST <i class="fas fa-tasks"></i></h1>

        <!-- Input Area -->
        <div class="input-area">
            <input type="text" id="taskInput" placeholder="Enter your Task...">
            
            <select id="priority">
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>

            <button id="addBtn">+ Add</button>
        </div>

        <!-- COUNTERS -->
        <div class="counters">
            <p>Total: <span id="totalCount">0</span></p>
            <p>Completed: <span id="completedCount">0</span></p>
            <p>Pending: <span id="pendingCount">0</span></p>
        </div>

        <!-- PROGRESS CIRCLE -->
        <div class="progress-container">
            <div class="circular-progress">
                <span id="progressValue">0%</span>
            </div>
        </div>

        <!-- TASK LIST -->
        <ul id="taskList"></ul>

    </div>

    <!-- JAVASCRIPT FILE -->
    <script src="app.js"></script>

</body>
</html>
